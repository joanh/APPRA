<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>APPRA — Social Card (Open Graph)</title>
  <!--
    Plantilla de la social card que se usa como og:image / twitter:image.
    Renderiza a exactamente 1200×630 px (ratio 1.91:1, recomendado por Facebook,
    LinkedIn, Twitter/X y WhatsApp para "summary_large_image").

    Cómo generar img/og-card.png a partir de este archivo:
      1. Abre este HTML en Chrome (doble click, o file://… en la barra).
      2. F12 para abrir DevTools.
      3. En el panel Elements, selecciona el <div class="card">.
      4. Click derecho → "Capture node screenshot".
      5. Guarda el PNG resultante como img/og-card.png en el repo.

    El PNG queda exactamente a 1200×630 (lo que cubre la card). El HTML se
    mantiene en el repo como fuente para regenerarlo si cambia el branding.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      background: #000;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .card {
      width: 1200px;
      height: 630px;
      position: relative;
      background: linear-gradient(135deg, #05253f 0%, #0a3a6e 50%, #0d1117 100%);
      color: #ffffff;
      display: grid;
      grid-template-columns: 460px 1fr;
      align-items: center;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -180px;
      right: -180px;
      width: 580px;
      height: 580px;
      background: radial-gradient(circle, rgba(137, 87, 229, 0.45) 0%, transparent 65%);
      filter: blur(50px);
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -180px;
      left: 80px;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(217, 119, 87, 0.30) 0%, transparent 65%);
      filter: blur(60px);
      pointer-events: none;
    }
    .left {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 40px;
      z-index: 1;
    }
    .logo {
      width: 300px;
      height: 300px;
      filter: drop-shadow(0 14px 42px rgba(0, 0, 0, 0.55));
    }
    .right {
      padding-right: 80px;
      z-index: 1;
    }
    .title {
      font-size: 144px;
      font-weight: 900;
      letter-spacing: -6px;
      line-height: 0.95;
      background: linear-gradient(135deg, #ffffff 0%, #c9a3ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 18px;
    }
    .subtitle {
      font-size: 30px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 22px;
      letter-spacing: 0.3px;
    }
    .desc {
      font-size: 21px;
      color: #cbd5e1;
      line-height: 1.45;
      font-weight: 400;
      max-width: 620px;
    }
    .footer {
      position: absolute;
      bottom: 30px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 17px;
      color: #94a3b8;
      font-weight: 500;
      z-index: 1;
    }
    .footer-left {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .badge {
      background: rgba(217, 119, 87, 0.18);
      border: 1px solid rgba(217, 119, 87, 0.55);
      border-radius: 999px;
      padding: 7px 16px;
      color: #fbbf9b;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.2px;
    }
    .footer-right {
      color: #94a3b8;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="left">
      <img src="../img/appra_logo.png" alt="APPRA" class="logo">
    </div>
    <div class="right">
      <h1 class="title">APPRA</h1>
      <p class="subtitle">Asistente de RAs y CEs para FP</p>
      <p class="desc">Resultados de Aprendizaje y Criterios de Evaluación de los módulos de Formación Profesional, extraídos del BOE oficial con Claude Opus 4.7.</p>
    </div>
    <div class="footer">
      <div class="footer-left">
        <span class="badge">Built with Claude Opus 4.7</span>
        <span>·</span>
        <span>Cerebral Valley Hackathon 2026</span>
      </div>
      <div class="footer-right">MIT · Open Source</div>
    </div>
  </div>
</body>
</html>
