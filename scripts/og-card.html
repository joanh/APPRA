<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #05253f, #0d1117);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #card {
            position: relative;
            width: 1280px; /* 16:9 aspect ratio */
            height: 720px;
            background: transparent;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
        }

        .purple-glow {
            width: 500px;
            height: 500px;
            background: #8957e5;
            top: -150px;
            right: -150px;
        }

        .coral-glow {
            width: 400px;
            height: 400px;
            background: #D97757;
            bottom: -100px;
            left: -100px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="card">
        <div class="glow purple-glow"></div>
        <div class="glow coral-glow"></div>
        <canvas id="particles"></canvas>
    </div>

    <div id="text-overlay" style="
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 36px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        ">
            APPRA - Gestión de RAs y CEs para FP
        </div>

    <script src="../lib/js/particles.min.js"></script>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;

        const nodes = [];
        const lines = [];

        function createNodes() {
            for (let i = 0; i < 14; i++) {
                const isLarge = i < 7;
                nodes.push({
                    x: Math.random() * canvas.width * 0.7 + canvas.width * 0.15,
                    y: Math.random() * canvas.height * 0.7 + canvas.height * 0.15,
                    radius: isLarge ? 10 : 5,
                    color: isLarge ? '#ffffff' : '#c9a3ff',
                    glow: isLarge ? '#ffffff' : '#c9a3ff',
                    check: !isLarge && Math.random() > 0.7
                });
            }
        }

        function connectNodes() {
            nodes.forEach((node, index) => {
                const connections = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < connections; i++) {
                    const targetIndex = Math.floor(Math.random() * nodes.length);
                    if (targetIndex !== index) {
                        lines.push({
                            from: node,
                            to: nodes[targetIndex]
                        });
                    }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw lines
            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.from.x, line.from.y);
                ctx.lineTo(line.to.x, line.to.y);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            // Draw nodes
            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = node.color;
                ctx.shadowColor = node.glow;
                ctx.shadowBlur = 20;
                ctx.fill();

                if (node.check) {
                    ctx.font = '10px Arial';
                    ctx.fillStyle = '#00ff00';
                    ctx.fillText('✔', node.x - 3, node.y + 3);
                }
            });
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        createNodes();
        connectNodes();
        animate();
    </script>
</body>
</html>
